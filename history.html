<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PlacementIQ – History</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<nav class="nav">
  <span class="nav-brand">PlacementIQ</span>
  <div class="nav-links">
    <a href="/">Predict</a>
    <a href="/history" class="active">History</a>
    <a href="/dashboard">Dashboard</a>
  </div>
</nav>

<div class="page">
  <div class="page-title">
    <h1>Assessment History</h1>
    <p>Browse and manage all past predictions</p>
  </div>

  <!-- Filters -->
  <div class="card">
    <div class="filter-bar">
      <div class="field">
        <label>Branch</label>
        <input type="text" id="filterBranch" placeholder="e.g. Computer Science">
      </div>
      <div class="field">
        <label>Result</label>
        <select id="filterResult">
          <option value="">All</option>
          <option value="Ready">Ready</option>
          <option value="Average">Average</option>
          <option value="Needs Work">Needs Work</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="loadHistory(1)" style="align-self:flex-end;padding:9px 16px;">
        Filter
      </button>
    </div>
  </div>

  <!-- Table -->
  <div class="card">
    <div class="card-header">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg>
      Records
      <span id="totalCount" style="margin-left:8px;font-weight:400;text-transform:none;letter-spacing:0;"></span>
      <button class="export-btn" onclick="exportCSV()" title="Export to CSV">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Export CSV
      </button>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Branch</th>
            <th>CGPA</th>
            <th>Score</th>
            <th>Result</th>
            <th>Date</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);">Loading…</td></tr>
        </tbody>
      </table>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

<div id="toast"></div>
<script src="/static/js/main.js"></script>
<script>
  let currentPage = 1;

  async function loadHistory(page = 1) {
    currentPage = page;
    const branch = document.getElementById("filterBranch").value.trim();
    const result = document.getElementById("filterResult").value;
    const params = new URLSearchParams({ page, per_page: 10 });
    if (branch) params.append("branch", branch);
    if (result) params.append("result", result);

    const tbody = document.getElementById("historyBody");
    tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);">Loading…</td></tr>`;

    try {
      const res  = await fetch(`/api/history?${params}`);
      const data = await res.json();

      document.getElementById("totalCount").textContent = `${data.total} record${data.total !== 1 ? "s" : ""}`;

      if (!data.items.length) {
        tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--muted);">No records found.</td></tr>`;
        document.getElementById("pagination").innerHTML = "";
        return;
      }

      tbody.innerHTML = data.items.map(a => {
        const bc = { "Ready": "badge-ready", "Average": "badge-average", "Needs Work": "badge-needs" }[a.result] || "";
        const barColor = a.result === "Ready" ? "#22c55e" : a.result === "Average" ? "#f59e0b" : "#ef4444";
        return `<tr>
          <td><strong>${esc(a.name)}</strong></td>
          <td style="color:var(--muted);">${esc(a.branch)}</td>
          <td>${a.cgpa}</td>
          <td>
            <div class="mini-bar-wrap">
              <strong>${a.score}%</strong>
              <div class="mini-bar"><div class="mini-bar-fill" style="width:${a.score}%;background:${barColor};"></div></div>
            </div>
          </td>
          <td><span class="badge ${bc}">${a.result}</span></td>
          <td style="color:var(--muted);font-size:0.8rem;">${a.created_at}</td>
          <td><button class="btn btn-danger-ghost btn-sm" onclick="del(${a.id})">Delete</button></td>
        </tr>`;
      }).join("");

      renderPagination(data.current_page, data.pages);
    } catch {
      tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;padding:32px;color:var(--danger);">Failed to load.</td></tr>`;
    }
  }

  function renderPagination(cur, total) {
    const el = document.getElementById("pagination");
    if (total <= 1) { el.innerHTML = ""; return; }
    let h = `<button onclick="loadHistory(${cur-1})" ${cur===1?"disabled":""}>← Prev</button>`;
    for (let i = 1; i <= total; i++)
      h += `<button class="${i===cur?"active":""}" onclick="loadHistory(${i})">${i}</button>`;
    h += `<button onclick="loadHistory(${cur+1})" ${cur===total?"disabled":""}>Next →</button>`;
    el.innerHTML = h;
  }

  async function del(id) {
    if (!confirm("Delete this record?")) return;
    const res = await fetch(`/api/history/${id}`, { method: "DELETE" });
    if (res.ok) { showToast("Deleted."); loadHistory(currentPage); }
    else showToast("Failed to delete.", "error");
  }

  async function exportCSV() {
    const res  = await fetch("/api/history?page=1&per_page=1000");
    const data = await res.json();
    if (!data.items.length) { showToast("No data to export.", "error"); return; }
    const headers = ["Name","Branch","CGPA","Backlogs","Internships","Projects","Aptitude","Problem Solving","Communication","Technical","Score","Result","Date"];
    const rows = data.items.map(a => [
      a.name, a.branch, a.cgpa, a.backlogs, a.internships, a.projects,
      a.aptitude, a.problem_solving, a.communication, a.technical,
      a.score, a.result, a.created_at
    ].map(v => `"${String(v).replace(/"/g,'""')}"`).join(","));
    const csv  = [headers.join(","), ...rows].join("\n");
    const blob = new Blob([csv], { type: "text/csv" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href = url; a.download = "placements.csv"; a.click();
    URL.revokeObjectURL(url);
    showToast("CSV exported!");
  }

  loadHistory(1);
</script>
</body>
</html>
